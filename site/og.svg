<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5bf"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#86868b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(700,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(800,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1000,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1100,0)"/>
  </g>

  <!-- Terminal mock (right side) -->
  <g transform="translate(620, 100)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="520" height="380" rx="12" fill="#0d0d0d" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="520" height="36" rx="12" fill="#191919"/>
    <rect x="0" y="24" width="520" height="12" fill="#191919"/>
    <line x1="0" y1="36" x2="520" y2="36" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Dots -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <!-- Tab -->
    <rect x="80" y="8" width="100" height="20" rx="5" fill="rgba(255,255,255,0.1)"/>
    <text x="95" y="22" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#fff">~/Projects</text>
    <rect x="190" y="8" width="60" height="20" rx="5" fill="rgba(255,255,255,0.04)"/>
    <text x="200" y="22" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8e8e93">/tmp</text>

    <!-- Terminal lines -->
    <text x="16" y="64" font-family="SF Mono, Menlo, monospace" font-size="13">
      <tspan fill="#00e5bf">~</tspan><tspan fill="#fff"> macuake state</tspan>
    </text>
    <text x="16" y="88" font-family="SF Mono, Menlo, monospace" font-size="12">
      <tspan fill="#00b4d8">"visible"</tspan><tspan fill="#8e8e93">: </tspan><tspan fill="#30d158">true</tspan>
    </text>
    <text x="16" y="112" font-family="SF Mono, Menlo, monospace" font-size="12">
      <tspan fill="#00b4d8">"tab_count"</tspan><tspan fill="#8e8e93">: </tspan><tspan fill="#30d158">2</tspan>
    </text>

    <text x="16" y="148" font-family="SF Mono, Menlo, monospace" font-size="13">
      <tspan fill="#00e5bf">~</tspan><tspan fill="#fff"> swift build -c release</tspan>
    </text>
    <text x="16" y="172" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#8e8e93">[42/42] Linking Macuake</text>
    <text x="16" y="196" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#30d158">Build complete! (12.34s)</text>

    <text x="16" y="232" font-family="SF Mono, Menlo, monospace" font-size="13">
      <tspan fill="#00e5bf">~</tspan><tspan fill="#fff"> macuake split --direction h</tspan>
    </text>
    <text x="16" y="256" font-family="SF Mono, Menlo, monospace" font-size="12">
      <tspan fill="#00b4d8">"ok"</tspan><tspan fill="#8e8e93">: </tspan><tspan fill="#30d158">true</tspan>
    </text>

    <text x="16" y="292" font-family="SF Mono, Menlo, monospace" font-size="13">
      <tspan fill="#00e5bf">~</tspan><tspan fill="#fff"> </tspan>
    </text>
    <!-- Cursor -->
    <rect x="28" y="280" width="8" height="16" fill="#00e5bf"/>

    <!-- Bottom glow -->
    <rect x="0" y="375" width="520" height="5" rx="0" fill="url(#accent)" opacity="0.15"/>
  </g>

  <!-- Left side text -->
  <text x="60" y="220" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="80" font-weight="700" fill="url(#title)">macuake</text>

  <text x="60" y="270" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#8e8e93">Quake-style drop-down terminal</text>

  <text x="60" y="310" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#8e8e93">for macOS.</text>

  <!-- Features pills -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="rgba(0,229,191,0.1)" stroke="rgba(0,229,191,0.3)" stroke-width="1"/>
    <text x="70" y="21" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#00e5bf" text-anchor="middle">GPU Metal</text>

    <rect x="154" y="0" width="170" height="32" rx="16" fill="rgba(0,229,191,0.1)" stroke="rgba(0,229,191,0.3)" stroke-width="1"/>
    <text x="239" y="21" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#00e5bf" text-anchor="middle">Option+Space</text>

    <rect x="338" y="0" width="140" height="32" rx="16" fill="rgba(0,229,191,0.1)" stroke="rgba(0,229,191,0.3)" stroke-width="1"/>
    <text x="408" y="21" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#00e5bf" text-anchor="middle">MCP Server</text>
  </g>

  <!-- Powered by -->
  <text x="60" y="420" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="16" fill="#636366">Powered by Ghostty</text>

  <!-- Beta badge -->
  <rect x="60" y="155" width="70" height="26" rx="13" fill="rgba(0,229,191,0.15)" stroke="rgba(0,229,191,0.3)" stroke-width="1"/>
  <text x="95" y="173" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#00e5bf" text-anchor="middle" letter-spacing="0.5">BETA</text>

  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)" opacity="0.5"/>
</svg>
