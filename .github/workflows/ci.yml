name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Ghostty submodule SHA
        id: ghostty-sha
        run: echo "sha=$(git -C vendor/ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: vendor/ghostty/macos/GhosttyKit.xcframework
          key: ghosttykit-${{ runner.arch }}-${{ steps.ghostty-sha.outputs.sha }}

      - name: Install zig (cache miss only)
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: brew install zig

      - name: Build GhosttyKit (cache miss only)
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: ./scripts/build-ghostty.sh

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test 2>&1 | tee test-output.txt

      - name: Test summary
        if: always()
        run: grep -E "(Test run|Suite.*failed)" test-output.txt || echo "Tests completed"
